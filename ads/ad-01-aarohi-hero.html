<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD 1 — Aarohi Hero Shot | NUBUILDCo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .ad {
      width: 1080px; height: 1080px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .ad img.bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.15) 30%, rgba(0,0,0,0.6) 70%, rgba(0,0,0,0.85) 100%);
    }
    .logo {
      position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
      height: 48px; width: auto; z-index: 5;
      filter: brightness(10);
    }
    .content {
      position: absolute; inset: 0; z-index: 4;
      display: flex; flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
    }
    .tagline {
      font-family: 'Inter', sans-serif;
      font-size: 14px; font-weight: 600;
      letter-spacing: 4px; text-transform: uppercase;
      color: #C49A6C; margin-bottom: 20px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 64px;
      line-height: 1.1; color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 24px;
    }
    .sub {
      font-size: 18px; font-weight: 400;
      color: rgba(255,255,255,0.75);
      line-height: 1.5; max-width: 500px;
      margin-bottom: 40px;
    }
    .cta {
      display: inline-block;
      padding: 18px 48px;
      background: #81350B;
      color: #fff; font-weight: 700;
      font-size: 15px; letter-spacing: 1px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge {
      position: absolute; top: 40px; right: 40px;
      z-index: 5;
      background: #C49A6C; color: #231C16;
      padding: 10px 20px; border-radius: 40px;
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="ad">
    <img class="bg" src="../assets/portfolio/aarohi/north-facade.jpg" alt="Aarohi Residence">
    <div class="overlay"></div>
    <img class="logo" src="../assets/logos/nubuild - logo - white.svg" alt="NUBUILDCo">
    <div class="badge">Aarohi Residence</div>
    <div class="content">
      <div class="tagline">We Build Legacies</div>
      <h1>Your Dream Home,<br>Built to Last</h1>
      <div class="sub">Premium end-to-end construction &amp; interiors in Hyderabad</div>
      <div><span class="cta">Book a Free Consultation &rarr;</span></div>
    </div>
  </div>
</body>
</html>
