<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD 8 — Ananthapur Apartment | NUBUILDCo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .ad {
      width: 1080px; height: 1080px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .ad img.bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0.15) 35%, rgba(0,0,0,0.7) 100%);
    }
    .logo {
      position: absolute; top: 40px; right: 44px;
      height: 44px; width: auto; z-index: 5;
      filter: brightness(10);
    }
    .top-text {
      position: absolute; top: 44px; left: 48px;
      z-index: 5;
    }
    .top-text .project-tag {
      display: inline-block;
      background: rgba(232,122,46,0.9);
      color: #fff; padding: 8px 18px;
      border-radius: 3px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .center-content {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 5; text-align: center; width: 80%;
    }
    .divider {
      width: 60px; height: 2px;
      background: #C49A6C;
      margin: 0 auto 24px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 56px;
      line-height: 1.15; color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 16px;
    }
    .sub {
      font-size: 16px; color: rgba(255,255,255,0.75);
      line-height: 1.5;
    }
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 6;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0;
    }
    .bottom-bar .info {
      background: rgba(35,28,22,0.95);
      padding: 22px 36px;
      flex: 1;
      display: flex; align-items: center; gap: 32px;
    }
    .bottom-bar .info .detail {
      display: flex; flex-direction: column;
    }
    .bottom-bar .info .detail .val {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 22px;
      color: #C49A6C;
    }
    .bottom-bar .info .detail .lbl {
      font-size: 11px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.5px;
    }
    .bottom-bar .cta-section {
      background: #E87A2E;
      padding: 22px 36px;
      display: flex; align-items: center;
    }
    .bottom-bar .cta-section span {
      color: #fff; font-weight: 700;
      font-size: 14px; letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="ad">
    <img class="bg" src="../assets/portfolio/ananthapur-apartment/interior-3.jpg" alt="Ananthapur Apartment">
    <div class="overlay"></div>
    <img class="logo" src="../assets/logos/nubuild - logo - white.svg" alt="NUBUILDCo">
    <div class="top-text">
      <div class="project-tag">Ananthapur Apartment</div>
    </div>
    <div class="center-content">
      <div class="divider"></div>
      <h1>Premium Apartments,<br>Thoughtful Design</h1>
      <div class="sub">Every corner crafted for comfort and elegance</div>
    </div>
    <div class="bottom-bar">
      <div class="info">
        <div class="detail">
          <div class="val">End-to-End</div>
          <div class="lbl">Design + Interiors</div>
        </div>
        <div class="detail">
          <div class="val">Premium</div>
          <div class="lbl">Materials &amp; Finishes</div>
        </div>
        <div class="detail">
          <div class="val">On Time</div>
          <div class="lbl">Guaranteed Delivery</div>
        </div>
      </div>
      <div class="cta-section">
        <span>Book a Call &rarr;</span>
      </div>
    </div>
  </div>
</body>
</html>
