<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD 7 — Sudharshan House | NUBUILDCo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .ad {
      width: 1080px; height: 1080px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
    }
    .ad img.bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.65) 100%);
    }
    .logo {
      position: absolute; top: 40px; left: 44px;
      height: 44px; width: auto; z-index: 5;
      filter: brightness(10);
    }
    .top-badge {
      position: absolute; top: 44px; right: 44px;
      z-index: 5;
      background: rgba(196,154,108,0.9);
      color: #231C16; padding: 10px 20px;
      border-radius: 4px;
      font-weight: 800; font-size: 13px;
      letter-spacing: 0.5px;
    }
    .bottom-section {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 5;
      background: linear-gradient(180deg, transparent 0%, rgba(35,28,22,0.95) 40%);
      padding: 80px 48px 44px;
    }
    .stat-row {
      display: flex; gap: 40px;
      margin-bottom: 24px;
    }
    .stat {
      display: flex; flex-direction: column;
    }
    .stat .value {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 40px;
      color: #C49A6C;
    }
    .stat .label {
      font-size: 12px; color: rgba(255,255,255,0.6);
      letter-spacing: 0.5px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 48px;
      line-height: 1.15; color: #fff;
      margin-bottom: 20px;
    }
    .cta {
      display: inline-block;
      padding: 16px 40px;
      background: #E87A2E;
      color: #fff; font-weight: 700;
      font-size: 14px; letter-spacing: 1px;
      border-radius: 4px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="ad">
    <img class="bg" src="../assets/portfolio/sudharshan-house/exterior-1.jpg" alt="Sudharshan House">
    <div class="overlay"></div>
    <img class="logo" src="../assets/logos/nubuild - logo - white.svg" alt="NUBUILDCo">
    <div class="top-badge">Sudharshan House</div>
    <div class="bottom-section">
      <div class="stat-row">
        <div class="stat">
          <div class="value">&#8377;25Cr+</div>
          <div class="label">Projects Delivered</div>
        </div>
        <div class="stat">
          <div class="value">6+</div>
          <div class="label">Years in Hyderabad</div>
        </div>
        <div class="stat">
          <div class="value">100%</div>
          <div class="label">On-Time Delivery</div>
        </div>
      </div>
      <h1>&#8377;25Cr+ Projects<br>Delivered</h1>
      <div><span class="cta">See Our Portfolio &rarr;</span></div>
    </div>
  </div>
</body>
</html>
