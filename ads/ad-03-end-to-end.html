<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AD 3 — End-to-End Solutions | NUBUILDCo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .ad {
      width: 1080px; height: 1080px;
      position: relative; overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: #FAF6F1;
    }
    /* Top half — image collage */
    .image-strip {
      position: absolute; top: 0; left: 0; right: 0;
      height: 50%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
    }
    .image-strip img {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .image-strip .overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(250,246,241,1) 100%);
      z-index: 2;
    }
    /* Bottom half — text */
    .text-section {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 54%;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 40px 60px;
      text-align: center;
      z-index: 3;
    }
    .label {
      font-size: 12px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      color: #E87A2E; margin-bottom: 20px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700; font-size: 52px;
      line-height: 1.15; color: #231C16;
      margin-bottom: 20px;
    }
    .services {
      display: flex; gap: 32px;
      margin-bottom: 32px;
    }
    .services .step {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .services .icon {
      width: 48px; height: 48px;
      background: #E87A2E; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 20px;
    }
    .services .step-label {
      font-size: 12px; font-weight: 600;
      color: #4A4A4A; letter-spacing: 0.5px;
    }
    .arrow {
      color: #C49A6C; font-size: 24px;
      align-self: center;
    }
    .cta {
      display: inline-block;
      padding: 18px 48px;
      background: #E87A2E;
      color: #fff; font-weight: 700;
      font-size: 14px; letter-spacing: 1px;
      border-radius: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .logo {
      height: 28px; width: auto;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="ad">
    <div class="image-strip">
      <img src="../assets/portfolio/aarohi/exterior-1.jpg" alt="Exterior">
      <img src="../assets/portfolio/aarohi/kitchen.jpg" alt="Kitchen">
      <img src="../assets/portfolio/new-project/living-area.jpg" alt="Living Area">
      <img src="../assets/portfolio/ananthapur-apartment/interior-1.jpg" alt="Interior">
      <div class="overlay"></div>
    </div>
    <div class="text-section">
      <div class="label">One Team. Zero Hassle.</div>
      <h1>End-to-End<br>Home Solutions</h1>
      <div class="services">
        <div class="step">
          <div class="icon">&#9998;</div>
          <div class="step-label">Design</div>
        </div>
        <span class="arrow">&rarr;</span>
        <div class="step">
          <div class="icon">&#9965;</div>
          <div class="step-label">Build</div>
        </div>
        <span class="arrow">&rarr;</span>
        <div class="step">
          <div class="icon">&#9733;</div>
          <div class="step-label">Furnish</div>
        </div>
        <span class="arrow">&rarr;</span>
        <div class="step">
          <div class="icon">&#10003;</div>
          <div class="step-label">Handover</div>
        </div>
      </div>
      <div><span class="cta">Get a Free Quote &rarr;</span></div>
      <img class="logo" src="../assets/logos/nubuild - logo - brown.svg" alt="NUBUILDCo">
    </div>
  </div>
</body>
</html>
